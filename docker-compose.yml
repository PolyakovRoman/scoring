version: '3.9'

services:

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scoring-php
    volumes:
      - ./:/var/www/scoring
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: scoring-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/scoring
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: mariadb:10.6
    container_name: scoring-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scoring
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
